name: Update latest writing

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual runs

permissions:
  contents: write # to write the post list back into README.md

jobs:
  update-readme:
    name: Sync latest essays from Medium
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull latest posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@codewithrashid"
          max_post_count: 5
          date_format: "mmm d, yyyy"
          template: "- [$title]($url) &nbsp;<sub>$date</sub>$newline"
